<!--Ejercicio 1.1 — Formulario de contacto semántico
Una empresa te pide maquetar un formulario de contacto para su web. Requisitos:

Campos: nombre, email, teléfono (opcional), mensaje, y un select de "Asunto" (Soporte / Ventas / Otro)
Cada input con su <label> correctamente asociado (accesibilidad)
Usa etiquetas semánticas para agrupar contenido (nada de <div> para todo)
Nombre y email obligatorios (validación HTML5 nativa, sin JS)
El formulario envía por POST a /contacto

Escribe el HTML completo, con <!DOCTYPE html> y estructura de página entera (no solo el <form> suelto).-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="script.js" defer></script> <!-- CON DEFER ESPERAMOS A QUE CARGE LA PÁGINA HTML PARA LEER EL JS-->
</head>
<body>
    <main>
        <section>
            <h1>Formulario</h1>
                <form id="formulario" name="formulario" method="post" action="/contacto">
                    <div class="campo">
                        <label for="nombre">Nombre</label>
                        <input type="text" name="nombre" id="nombre"> <!--required lo quito para que salte el validador JS-->
                    </div>
                    <div class="campo">
                        <label for="mail">Mail</label>
                        <input type="email" name="mail" id="mail"> <!--required lo quito para que salte el validador JS-->
                    </div>
                    </div>
                    <div class="campo">
                        <label for="telefono">Teléfono </label>
                        <input type="tel" name="telefono" id="telefono">
                    </div>
                    <div class="campo">
                        <label for="mensaje">Mensaje</label>
                        <textarea name="mensaje" id="mensaje" placeholder="Escribe tu mensaje"></textarea>
                    </div>
                    <div class="campo">
                        <label for="asunto">Selecciona</label>
                        <select name="asunto" id="asunto" >
                            <option>Soporte</option>
                            <option>Ventas</option>
                            <option>Otros</option>
                        </select>
                    </div>
                    <button type="submit">Enviar</button>
                </form>
        </section>
    </main>    
</body>
</html>
